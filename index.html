<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FitAI Coach">
<meta name="description" content="Il tuo coach fitness e nutrizionale personale con AI.">
<link rel="manifest" href="/manifest.json">
<title>FitAI Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@500;600;700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f5f0;--card:#fff;--border:#e8e4dc;--accent:#1a1a2e;--green:#2d6a4f;--gl:#d8f3dc;--orange:#e76f51;--ol:#fde8e0;--yellow:#f4a261;--blue:#3b82f6;--bl:#dbeafe;--purple:#7c3aed;--pl:#ede9fe;--red:#dc2626;--rl:#fee2e2;--text:#1a1a2e;--muted:#7a7a8c;--r:18px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;}
.pb-wrap{position:fixed;top:0;left:0;right:0;z-index:100;height:4px;background:var(--border);}
.pb-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--yellow));transition:width .5s cubic-bezier(.4,0,.2,1);}
.step-dots{position:fixed;top:10px;left:0;right:0;z-index:100;display:flex;justify-content:center;gap:5px;padding-top:8px;}
.sd{width:7px;height:7px;border-radius:50%;background:var(--border);transition:.3s;}
.sd.done{background:var(--green);}
.sd.active{background:var(--orange);width:20px;border-radius:4px;}
.outer{max-width:560px;margin:0 auto;padding:52px 20px 80px;}
.step{display:none;animation:sIn .4s cubic-bezier(.4,0,.2,1) both;}
.step.active{display:block;}
@keyframes sIn{from{opacity:0;transform:translateX(28px);}to{opacity:1;transform:none;}}
.step-header{margin-bottom:26px;}
.stag{display:inline-block;padding:4px 12px;border-radius:999px;background:var(--ol);color:var(--orange);font-size:11px;font-weight:700;margin-bottom:11px;letter-spacing:.06em;text-transform:uppercase;}
.stag.green{background:var(--gl);color:var(--green);}
.stag.red{background:var(--rl);color:var(--red);}
.stag.blue{background:var(--bl);color:var(--blue);}
.stag.purple{background:var(--pl);color:var(--purple);}
.stitle{font-family:'Clash Display',sans-serif;font-weight:700;font-size:clamp(20px,5vw,32px);line-height:1.1;margin-bottom:8px;}
.ssub{color:var(--muted);font-size:14px;line-height:1.6;}
/* LANG */
.lang-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.lang-card{border:2px solid var(--border);border-radius:13px;padding:13px 5px;cursor:pointer;transition:.2s;background:var(--card);text-align:center;user-select:none;}
.lang-card:hover{border-color:var(--accent);}
.lang-card.sel{border-color:var(--green);background:var(--gl);}
.lang-card .lf{font-size:22px;margin-bottom:3px;}
.lang-card .ln{font-size:10px;font-weight:600;color:var(--muted);}
.lang-card.sel .ln{color:var(--green);}
/* GOAL */
.goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.goal-card{border:2px solid var(--border);border-radius:var(--r);padding:18px 14px;cursor:pointer;transition:.2s;background:var(--card);user-select:none;}
.goal-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 5px 18px rgba(0,0,0,.08);}
.goal-card.sel{border-color:var(--green);background:var(--gl);}
.goal-card .gi{font-size:30px;margin-bottom:9px;}
.goal-card .gl{font-family:'Clash Display',sans-serif;font-weight:600;font-size:14px;margin-bottom:3px;}
.goal-card .gd{font-size:12px;color:var(--muted);line-height:1.4;}
.goal-card.sel .gd{color:var(--green);}
/* FORMS */
.form-row{display:flex;gap:11px;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;flex:1;}
label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
input[type=number],input[type=text],select,textarea{background:var(--card);border:2px solid var(--border);color:var(--text);border-radius:11px;padding:12px 14px;font-family:'Figtree',sans-serif;font-size:15px;transition:.2s;outline:none;width:100%;-moz-appearance:textfield;}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(45,106,79,.1);}
select option{background:var(--card);}
textarea{resize:vertical;}
/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:5px;}
.chip{padding:7px 14px;border-radius:999px;border:2px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;transition:.2s;user-select:none;font-family:'Figtree',sans-serif;}
.chip:hover{border-color:var(--accent);color:var(--text);}
.chip.sel{background:var(--accent);border-color:var(--accent);color:#fff;}
/* SPORT ROW */
.sport-row{display:flex;gap:8px;align-items:center;margin-bottom:7px;}
.sport-row input{flex:1;}
.rm-btn{width:34px;height:34px;border-radius:9px;border:2px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;}
.rm-btn:hover{border-color:var(--orange);color:var(--orange);}
.add-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:9px;border:2px dashed var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-family:'Figtree',sans-serif;font-weight:500;transition:.2s;margin-top:4px;}
.add-btn:hover{border-color:var(--green);color:var(--green);}
/* BUTTONS */
.nav-row{display:flex;gap:10px;margin-top:28px;}
.btn{flex:1;padding:14px;border-radius:13px;border:none;cursor:pointer;font-family:'Clash Display',sans-serif;font-weight:600;font-size:15px;transition:.2s;}
.btn:active{transform:scale(.98);}
.btn-next{background:var(--accent);color:#fff;}
.btn-next:hover{background:#2d2d50;box-shadow:0 5px 18px rgba(26,26,46,.25);}
.btn-next:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;}
.btn-back{background:var(--card);color:var(--muted);border:2px solid var(--border);flex:0 0 auto;padding:14px 18px;}
.btn-back:hover{border-color:var(--accent);color:var(--text);}
/* LOADING */
.loading-screen{display:none;text-align:center;padding:55px 20px;}
.loading-screen.show{display:block;}
.loader{width:52px;height:52px;border-radius:50%;border:4px solid var(--border);border-top-color:var(--green);animation:spin .8s linear infinite;margin:0 auto 22px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-title{font-family:'Clash Display',sans-serif;font-weight:700;font-size:21px;margin-bottom:7px;}
.loading-sub{color:var(--muted);font-size:13px;}
.loading-steps{margin-top:22px;display:flex;flex-direction:column;gap:7px;}
.loading-step{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:9px;background:var(--card);font-size:13px;color:var(--muted);border:1.5px solid var(--border);transition:.4s;}
.loading-step.done{color:var(--green);border-color:var(--gl);background:var(--gl);}
.loading-step.active{color:var(--text);border-color:var(--accent);}
.loading-step .ls-icon{font-size:15px;}
/* SCREENS */
.plan-screen,.progress-screen{display:none;}
.plan-screen.show,.progress-screen.show{display:block;animation:sIn .4s ease both;}
/* TAB BAR */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1.5px solid var(--border);display:none;z-index:100;}
.tab-bar.show{display:flex;}
.tab-btn{flex:1;padding:11px 8px 15px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'Figtree',sans-serif;font-size:11px;font-weight:600;color:var(--muted);transition:.2s;}
.tab-btn.active{color:var(--green);}
.tab-icon{font-size:21px;}
/* PLAN HERO */
.plan-hero{background:var(--accent);border-radius:var(--r);padding:22px;color:#fff;margin-bottom:18px;}
.plan-hero-title{font-family:'Clash Display',sans-serif;font-weight:700;font-size:24px;margin-bottom:4px;}
.plan-hero-sub{font-size:12px;opacity:.6;margin-bottom:18px;}
.macro-row{display:flex;gap:7px;flex-wrap:wrap;}
.macro-badge{flex:1;min-width:65px;background:rgba(255,255,255,.1);border-radius:9px;padding:11px 7px;text-align:center;border:1px solid rgba(255,255,255,.15);}
.macro-badge .mv{font-family:'Clash Display',sans-serif;font-weight:700;font-size:19px;}
.macro-badge .ml{font-size:9px;opacity:.6;margin-top:2px;}
/* WEEK TABS */
.week-nav{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;}
.week-nav::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;padding:7px 13px;border-radius:999px;border:2px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;transition:.2s;white-space:nowrap;}
.day-tab:hover{border-color:var(--accent);}
.day-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.day-tab.rest-tab.active{background:var(--green);border-color:var(--green);}
.day-card{display:none;animation:sIn .3s ease both;}
.day-card.active{display:block;}
.day-header{display:flex;align-items:center;gap:11px;margin-bottom:14px;}
.day-badge{width:46px;height:46px;border-radius:13px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Clash Display',sans-serif;font-weight:700;font-size:12px;flex-shrink:0;}
.day-badge.rest{background:var(--green);}
.day-name{font-family:'Clash Display',sans-serif;font-weight:700;font-size:19px;}
.day-type{font-size:12px;color:var(--muted);margin-top:2px;}
.section-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:11px;}
.section-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:5px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.meal-item{display:flex;gap:11px;margin-bottom:11px;align-items:flex-start;}
.meal-item:last-child{margin-bottom:0;}
.meal-time{font-size:10px;font-weight:700;color:#fff;background:var(--orange);border-radius:7px;padding:3px 7px;flex-shrink:0;margin-top:2px;white-space:nowrap;}
.meal-content .meal-name{font-weight:600;font-size:14px;margin-bottom:2px;}
.meal-content .meal-desc{font-size:12px;color:var(--muted);line-height:1.5;}
.meal-content .meal-kcal{font-size:10px;color:var(--orange);font-weight:600;margin-top:2px;}
.workout-item{display:flex;gap:11px;margin-bottom:9px;align-items:center;}
.workout-item:last-child{margin-bottom:0;}
.workout-num{width:26px;height:26px;border-radius:7px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.workout-content .workout-name{font-weight:600;font-size:13px;}
.workout-content .workout-detail{font-size:11px;color:var(--muted);margin-top:1px;}
.rest-card{background:var(--gl);border:1.5px solid var(--green);border-radius:var(--r);padding:22px;text-align:center;}
.rest-icon{font-size:44px;margin-bottom:10px;}
.rest-title{font-family:'Clash Display',sans-serif;font-weight:700;font-size:18px;color:var(--green);margin-bottom:7px;}
.rest-text{font-size:13px;color:var(--muted);line-height:1.6;}
.tip-item{display:flex;gap:11px;align-items:flex-start;border-radius:11px;padding:13px;margin-bottom:7px;background:var(--card);border:1.5px solid var(--border);}
.tip-item:last-child{margin-bottom:0;}
.tip-icon{font-size:18px;flex-shrink:0;}
.tip-text{font-size:13px;line-height:1.6;}
/* SUNDAY BANNER */
.sunday-banner{background:linear-gradient(135deg,var(--purple),var(--blue));border-radius:var(--r);padding:16px 18px;color:#fff;margin-bottom:14px;cursor:pointer;transition:.2s;}
.sunday-banner:hover{opacity:.92;transform:translateY(-1px);}
.sunday-banner-top{display:flex;align-items:center;gap:9px;margin-bottom:3px;}
.sunday-banner-icon{font-size:22px;}
.sunday-banner-title{font-family:'Clash Display',sans-serif;font-weight:700;font-size:16px;}
.sunday-banner-sub{font-size:12px;opacity:.8;}
/* PROGRESS */
.ai-feedback{background:linear-gradient(135deg,var(--pl),var(--bl));border:1.5px solid var(--purple);border-radius:var(--r);padding:16px;margin-bottom:14px;display:none;}
.ai-feedback.show{display:block;animation:sIn .4s ease both;}
.ai-feedback-label{font-size:10px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;}
.ai-feedback-text{font-size:13px;line-height:1.7;color:var(--text);}
.ai-feedback-loader{display:flex;align-items:center;gap:9px;color:var(--muted);font-size:13px;}
.mini-spin{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--purple);animation:spin .6s linear infinite;flex-shrink:0;}
.week-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:11px;}
.week-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.week-card-title{font-family:'Clash Display',sans-serif;font-weight:700;font-size:15px;}
.stars-display{display:flex;gap:2px;}
.star-f{color:#f4a261;font-size:15px;}
.star-e{color:var(--border);font-size:15px;}
.mini-bar-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.mini-bar-row:last-child{margin-bottom:0;}
.mini-bar-label{font-size:11px;color:var(--muted);width:88px;flex-shrink:0;}
.mini-bar{flex:1;height:6px;background:var(--bg);border-radius:999px;overflow:hidden;border:1px solid var(--border);}
.mini-bar-fill{height:100%;border-radius:999px;transition:width .8s ease;}
.mbd{background:var(--orange);}.mbw{background:var(--green);}.mbt{background:var(--blue);}
.mini-bar-pct{font-size:10px;font-weight:600;color:var(--muted);width:30px;text-align:right;}
.no-checkins-box{text-align:center;padding:38px 20px;color:var(--muted);}
.no-checkins-icon{font-size:44px;margin-bottom:10px;}
.no-checkins-text{font-size:13px;line-height:1.7;}
.btn-full{width:100%;padding:14px;border-radius:13px;border:none;cursor:pointer;font-family:'Clash Display',sans-serif;font-weight:600;font-size:15px;transition:.2s;margin-top:4px;}
.btn-full:active{transform:scale(.98);}
.btn-green-full{background:var(--green);color:#fff;}
.btn-green-full:hover{background:#245a42;box-shadow:0 5px 18px rgba(45,106,79,.3);}
.btn-outline-full{width:100%;padding:13px;border-radius:11px;border:2px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-family:'Clash Display',sans-serif;font-weight:600;font-size:13px;transition:.2s;margin-top:9px;}
.btn-outline-full:hover{border-color:var(--accent);}
.disc{font-size:10px;color:var(--muted);text-align:center;margin-top:18px;line-height:1.5;}
/* WEIGHT CHART */
.weight-chart-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px;}
.weight-chart-title{font-family:'Clash Display',sans-serif;font-weight:700;font-size:15px;margin-bottom:4px;}
.weight-chart-sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
.weight-stats{display:flex;gap:8px;margin-bottom:16px;}
.wstat{flex:1;background:var(--bg);border-radius:10px;padding:10px 8px;text-align:center;border:1.5px solid var(--border);}
.wstat .wv{font-family:'Clash Display',sans-serif;font-weight:700;font-size:18px;}
.wstat .wl{font-size:10px;color:var(--muted);margin-top:2px;}
.wstat .wd{font-size:11px;font-weight:600;margin-top:2px;}
.wpos{color:var(--green);}.wneg{color:var(--orange);}
.chart-wrap{position:relative;height:120px;margin-top:4px;}
.chart-wrap svg{width:100%;height:100%;}
/* WEIGHT INPUT in modal */
.weight-input-row{display:flex;align-items:center;gap:10px;margin-top:6px;}
.weight-input-row input{flex:1;font-size:18px;font-weight:600;text-align:center;padding:12px;}
.weight-unit{font-size:14px;color:var(--muted);font-weight:600;flex-shrink:0;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--card);border-radius:22px 22px 0 0;padding:26px 22px 42px;width:100%;max-width:560px;max-height:90dvh;overflow-y:auto;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 22px;}
.modal-title{font-family:'Clash Display',sans-serif;font-weight:700;font-size:21px;margin-bottom:5px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.5;}
.cq{margin-bottom:18px;}
.cq-label{font-size:13px;font-weight:600;margin-bottom:11px;line-height:1.4;}
.cq-options{display:flex;flex-direction:column;gap:7px;}
.cq-opt{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;border:2px solid var(--border);background:var(--bg);cursor:pointer;transition:.2s;user-select:none;}
.cq-opt:hover{border-color:var(--accent);}
.cq-opt.sel{border-color:var(--green);background:var(--gl);}
.cq-opt-icon{font-size:19px;flex-shrink:0;}
.cq-opt-text{font-size:13px;font-weight:500;}
.cq-opt.sel .cq-opt-text{color:var(--green);font-weight:600;}
.divider{height:1px;background:var(--border);margin:18px 0;}
.stars-input{display:flex;gap:9px;margin-top:5px;}
.star-btn{font-size:32px;cursor:pointer;transition:.15s;background:none;border:none;padding:0;line-height:1;color:var(--border);}
.star-btn:hover{transform:scale(1.15);}
@media(max-width:400px){.lang-grid{grid-template-columns:repeat(5,1fr);}.goal-grid{grid-template-columns:1fr 1fr;}.form-row{flex-direction:column;}}
</style>
</head>
<body>

<div class="pb-wrap"><div class="pb-fill" id="pbFill" style="width:0%"></div></div>
<div class="step-dots" id="stepDots"></div>

<div class="outer">

  <!-- S1: LINGUA -->
  <div class="step active" id="step1">
    <div class="step-header"><div class="stag">Benvenuto · Welcome</div><div class="stitle">Scegli la tua lingua</div><div class="ssub">Choose your language</div></div>
    <div class="lang-grid" id="langGrid"></div>
    <div class="nav-row"><button class="btn btn-next" id="nextLang" disabled onclick="goStep(2)">Continua →</button></div>
  </div>

  <!-- S2: OBIETTIVO -->
  <div class="step" id="step2">
    <div class="step-header"><div class="stag" id="tag2"></div><div class="stitle" id="title2"></div><div class="ssub" id="sub2"></div></div>
    <div class="goal-grid" id="goalGrid"></div>
    <div class="nav-row"><button class="btn btn-back" onclick="goStep(1)">←</button><button class="btn btn-next" id="nextGoal" disabled onclick="goStep(3)"></button></div>
  </div>

  <!-- S3: DATI PERSONALI -->
  <div class="step" id="step3">
    <div class="step-header"><div class="stag" id="tag3"></div><div class="stitle" id="title3"></div><div class="ssub" id="sub3"></div></div>
    <div class="form-row">
      <div class="fg"><label id="lAge"></label><input type="number" id="age" min="15" max="80" placeholder="28"></div>
      <div class="fg"><label id="lGender"></label><select id="gender"></select></div>
    </div>
    <div class="form-row">
      <div class="fg"><label id="lHeight"></label><input type="number" id="height" min="140" max="220" placeholder="175"></div>
      <div class="fg"><label id="lWeight"></label><input type="number" id="weight" min="40" max="300" step="0.1" placeholder="75"></div>
    </div>
    <div class="fg"><label id="lTarget"></label><input type="number" id="targetWeight" min="40" max="300" step="0.1" placeholder="68"></div>
    <div class="nav-row"><button class="btn btn-back" onclick="goStep(2)">←</button><button class="btn btn-next" id="nextPersonal" disabled onclick="goStep(4)"></button></div>
  </div>

  <!-- S4: DOCUMENTAZIONE MEDICA -->
  <div class="step" id="step4">
    <div class="step-header"><div class="stag red" id="tag4"></div><div class="stitle" id="title4"></div><div class="ssub" id="sub4"></div></div>
    <div class="fg"><label id="lMedOpts"></label><div class="chips" id="medChips"></div></div>
    <div class="fg" style="margin-top:14px;"><label id="lMedExtra"></label><textarea id="medExtra" rows="4" placeholder="..."></textarea></div>
    <div class="nav-row"><button class="btn btn-back" onclick="goStep(3)">←</button><button class="btn btn-next" onclick="goStep(5)" id="nextMed"></button></div>
  </div>

function init(){
  $('stepDots').innerHTML=Array.from({length:TOTAL_STEPS},(_,i)=>`<div class="sd" id="dot${i+1}"></div>`).join('');
  $('langGrid').innerHTML=LANGS.map(l=>`<div class="lang-card" onclick="selLang('${l.code}')" id="lc_${l.code}"><div class="lf">${l.flag}</div><div class="ln">${l.name}</div></div>`).join('');
  updateProgress(1);
}
function selLang(c){
  lang=c;

  $(`lc_${c}`).classList.add('sel');
  $('nextLang').disabled=false; $('nextLang').textContent=TX[c].next;
}
function goStep(n){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  $('loadingScreen').classList.remove('show');
  $(`step${n}`).classList.add('active');
  currentStep=n; updateProgress(n);
  const builders={2:buildStep2,3:buildStep3,4:buildStep4,5:buildStep5,6:buildStep6,7:buildStep7,8:buildStep8,9:buildStep9};
  if(builders[n]) builders[n]();
  window.scrollTo({top:0,behavior:'smooth'});
}
let currentStep=1;
function updateProgress(n){
  $('pbFill').style.width=((n-1)/TOTAL_STEPS*100)+'%';
  for(let i=1;i<=TOTAL_STEPS;i++){
    const d=$(`dot${i}`); if(d) d.className='sd'+(i<n?' done':i===n?' active':'');
  }
}

  $('nextGoal').textContent=tx.next; $('nextGoal').disabled=goal===null;
}
function selGoal(i){goal=i; buildStep2();}

function buildStep3(){
  const tx=TX[lang];

  $('nextPersonal').textContent=tx.next;
  ['age','height','weight','targetWeight'].forEach(id=>{$(id).oninput=checkPersonal;});
  checkPersonal();
}

// ─── GENERATE PLAN (4 small calls — no truncation) ───────────────────────────
async function generatePlan(){
  const tx=TX[lang];
  const age=$('age').value, gender=$('gender').value, height=$('height').value;
  const weight=parseFloat($('weight').value), target=parseFloat($('targetWeight').value);
  const goalLabel=tx.goals[goal].l, actLabel=tx.activity[actLevel];
  const sports=[...$('sportsContainer').querySelectorAll('input')].map(i=>i.value).filter(v=>v.trim());
  const medLabels=medConds.map(i=>tx.medOpts[i]).join(', ')||'None';
  const medExtra=$('medExtra').value||'None';
  const pharmLabels=pharmItems.map(i=>tx.pharmOpts[i]).join(', ')||'None';
  const pharmExtra=$('pharmExtra').value||'None';
  const dietLabels=diets.map(i=>tx.diet[i]).join(', ')||'None';
  const dietExtra=$('dietExtra').value||'None';
  const equipLabels=equip.map(i=>tx.equip[i]).join(', ')||'None';
  const equipExtra=$('equipExtra').value||'None';
  const notes=$('notes').value||'None';
  const LN={it:'Italian',en:'English',es:'Spanish',zh:'Chinese',hi:'Hindi',ar:'Arabic',pt:'Portuguese',fr:'French',de:'German',ja:'Japanese'}[lang]||'Italian';

  // Compact profile string
  const P=`Age:${age},Sex:${gender},H:${height}cm,W:${weight}kg,Target:${target}kg,Goal:${goalLabel},Activity:${actLabel},Sports:${sports.join('/')||'None'},MedConds:${medLabels},MedNotes:${medExtra},Meds:${pharmLabels},MedExtra:${pharmExtra},Diet:${dietLabels},DietNotes:${dietExtra},Equip:${equipLabels}${equipExtra!=='None'?'/'+equipExtra:''},Notes:${notes}`;

  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  $('loadingScreen').classList.add('show');
  $('loadingTitle').textContent=tx.loadingTitle;
  $('loadingSub').textContent=tx.loadingSub;
  $('loadingSteps').innerHTML=tx.loadingSteps.map((s,i)=>`<div class="loading-step" id="ls${i}"><span class="ls-icon">⏳</span>${s}</div>`).join('');

  let li=0;
  const lsInt=setInterval(()=>{
    if(li>0){const p=$(`ls${li-1}`);if(p){p.classList.replace('active','done');p.querySelector('.ls-icon').textContent='✅';}}
    const c=$(`ls${li}`);if(c){c.classList.add('active');c.querySelector('.ls-icon').textContent='⏳';}
    li++;if(li>=tx.loadingSteps.length)clearInterval(lsInt);
  },1300);

  // Robust JSON-only call helper
  function cleanJSON(raw){
    let s = raw.trim();
    // Remove opening fence: ```json\n or ```\n
    if(s.indexOf('```') === 0){
      const nl = s.indexOf('\n');
      s = (nl !== -1) ? s.slice(nl + 1) : s.slice(3);
      s = s.trim();
    }
    // Remove closing fence
    const closeFence = s.lastIndexOf('```');
    if(closeFence !== -1 && closeFence > s.length - 6){
      s = s.slice(0, closeFence).trim();
    }
    // Find first JSON char { or [
    const fi = s.indexOf('{');
    const fj = s.indexOf('[');
    let first = Infinity;
    if(fi !== -1) first = Math.min(first, fi);
    if(fj !== -1) first = Math.min(first, fj);
    const last = Math.max(s.lastIndexOf('}'), s.lastIndexOf(']'));
    if(first === Infinity || last === -1)
      throw new Error('No JSON in AI response: ' + s.slice(0, 120));
    return s.slice(first, last + 1);
  }
    const callAI=async(prompt,maxT)=>{
    const r=await fetch(window.location.origin+'/api/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxT,
        system:'Respond with ONLY raw JSON. No backticks, no markdown fences, no explanation, no text outside the JSON.',
        messages:[{role:'user',content:prompt}]
      })
    });
    const d=await r.json();
    const raw=d.content.map(c=>c.text||'').join('');
    return JSON.parse(cleanJSON(raw));
  };
  const ms=(i,done)=>{const e=$(`ls${i}`);if(!e)return;e.className='loading-step '+(done?'done':'active');e.querySelector('.ls-icon').textContent=done?'✅':'⏳';};

  const D=tx.days, DS=tx.daysShort;

  try{
    // CALL 1 — macros + 5 workouts + 2 rest days + tips
    ms(0,false);
    const c1=await callAI(
      `Fitness coach. Profile: ${P}. Language: ${LN}.
Respond with this exact JSON (fill all ... with real content in ${LN}):
{"kcal":2200,"protein":160,"carbs":210,"fats":65,"tips":["tip1","tip2","tip3"],"schedule":[
{"day":"${D[0]}","type":"training","workout":{"title":"...","duration":"50 min","exercises":[{"name":"...","detail":"3x10"},{"name":"...","detail":"3x10"},{"name":"...","detail":"3x12"},{"name":"...","detail":"3x12"},{"name":"...","detail":"3x15"}]}},
{"day":"${D[1]}","type":"training","workout":{"title":"...","duration":"50 min","exercises":[{"name":"...","detail":"3x10"},{"name":"...","detail":"3x10"},{"name":"...","detail":"3x12"},{"name":"...","detail":"3x12"},{"name":"...","detail":"3x15"}]}},
{"day":"${D[2]}","type":"training","workout":{"title":"...","duration":"50 min","exercises":[{"name":"...","detail":"3x10"},{"name":"...","detail":"3x10"},{"name":"...","detail":"3x12"},{"name":"...","detail":"3x12"},{"name":"...","detail":"3x15"}]}},
{"day":"${D[3]}","type":"training","workout":{"title":"...","duration":"50 min","exercises":[{"name":"...","detail":"3x10"},{"name":"...","detail":"3x10"},{"name":"...","detail":"3x12"},{"name":"...","detail":"3x12"},{"name":"...","detail":"3x15"}]}},
{"day":"${D[4]}","type":"training","workout":{"title":"...","duration":"50 min","exercises":[{"name":"...","detail":"3x10"},{"name":"...","detail":"3x10"},{"name":"...","detail":"3x12"},{"name":"...","detail":"3x12"},{"name":"...","detail":"3x15"}]}},
{"day":"${D[5]}","type":"rest"},{"day":"${D[6]}","type":"rest"}]}
Rules: vary muscle groups Mon-Fri, match equipment (${equipLabels}), consider medical conditions (${medLabels}).`,
      1800);

    ms(0,true); ms(1,false);

    // CALL 2 — workouts already done, now meals Mon (1 day only — very small)
    const mealPrompt=(dayName)=>
      `Nutritionist. Profile: ${P}. Target: ${c1.kcal}kcal/day, ${c1.protein}g protein. Diet: ${dietLabels}. Medical conditions: ${medLabels}.
Return a JSON object for ${dayName} meals in ${LN}:
{"meals":[{"time":"07:30","name":"...","desc":"food with exact grams","kcal":450},{"time":"10:30","name":"...","desc":"...","kcal":180},{"time":"13:00","name":"...","desc":"...","kcal":580},{"time":"16:30","name":"...","desc":"...","kcal":180},{"time":"20:00","name":"...","desc":"...","kcal":530}]}
Total must be close to ${c1.kcal} kcal. Match diet preferences. Be specific with food names and exact gram quantities.`;

    // CALL 2 — Mon + Tue meals
    ms(1,true); ms(2,false);
    const [monMeals, tueMeals] = await Promise.all([
      callAI(mealPrompt(D[0]), 700),
      callAI(mealPrompt(D[1]), 700),
    ]);

    // CALL 3 — Wed + Thu meals
    ms(2,true); ms(3,false);
    const [wedMeals, thuMeals] = await Promise.all([
      callAI(mealPrompt(D[2]), 700),
      callAI(mealPrompt(D[3]), 700),
    ]);

    // CALL 4 — Fri meals
    ms(3,true); ms(4,false);
    const friFull = await callAI(mealPrompt(D[4]), 700);

    // Assemble
    const allMeals=[monMeals,tueMeals,wedMeals,thuMeals,friFull];
    savedPlan={
      kcal:c1.kcal, protein:c1.protein, carbs:c1.carbs, fats:c1.fats, tips:c1.tips,
      days:c1.schedule.map((s,i)=>s.type==='rest'?s:{...s, meals:(allMeals[i]||{}).meals||[]})
    };

    clearInterval(lsInt); ms(4,true);
    setTimeout(showApp, 500);

  }catch(err){
    clearInterval(lsInt);
    $('loadingTitle').textContent='Errore — '+err.message;
    $('loadingSub').textContent='Riprova o controlla la connessione.';
  }
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────
function renderProgress(){
  const tx=TX[lang];
  $('progTag').textContent=tx.progTag; $('progTitle').textContent=tx.progTitle; $('progSub').textContent=tx.progSub;
  $('btnOpenCheckin').textContent=tx.btnOpenCheckin;
  const list=$('weekHistoryList');
  if(!checkins.length){
    list.innerHTML=`<div class="no-checkins-box"><div class="no-checkins-icon">📅</div><div class="no-checkins-text">${tx.noCheckins.replace('\n','<br>')}</div></div>`;
    return;
  }
  // Weight chart
  const weightSection = $('weightChartSection');
  const startW = parseFloat($('weight').value)||0;
  const targetW = parseFloat($('targetWeight').value)||0;
  const weightsWithData = checkins.filter(ck=>ck.weight>0);
  if(weightsWithData.length > 0){
    const currentW = weightsWithData[weightsWithData.length-1].weight;
    const delta = currentW - startW;
    const deltaSign = delta < 0 ? 'wpos' : delta > 0 ? 'wneg' : '';
    const deltaStr = (delta > 0 ? '+' : '') + delta.toFixed(1) + ' kg';
    // Build SVG line chart
    const allW = [startW, ...weightsWithData.map(c=>c.weight)];
    const labels = [lang==='it'?'Inizio':'Start', ...weightsWithData.map((_,i)=>((lang==='it'?'Sett.':'Wk ')+(i+1)))];
    const minW = Math.min(...allW, targetW) - 1;
    const maxW = Math.max(...allW, targetW) + 1;
    const range = maxW - minW || 1;
    const W = 400, H = 100, PAD = 8;
    const pts = allW.map((w,i) => {
      const x = PAD + (i/(allW.length-1||1))*(W-PAD*2);
      const y = H - PAD - ((w-minW)/range)*(H-PAD*2);
      return [x,y];
    });
    const polyline = pts.map(p=>p.join(',')).join(' ');
    const targetY = H - PAD - ((targetW-minW)/range)*(H-PAD*2);
    // Circles
    const circles = pts.map(([x,y],i) => `<circle cx="${x}" cy="${y}" r="4" fill="${i===pts.length-1?'var(--green)':'var(--accent)'}" />`).join('');
    // Value labels
    const valueLabels = pts.map(([x,y],i) => `<text x="${x}" y="${y-8}" text-anchor="middle" font-size="9" fill="var(--muted)">${allW[i]}kg</text>`).join('');
    // Target line
    const targetLine = `<line x1="${PAD}" y1="${targetY}" x2="${W-PAD}" y2="${targetY}" stroke="var(--orange)" stroke-width="1.5" stroke-dasharray="4,3" />`;
    const targetLabel = `<text x="${W-PAD+2}" y="${targetY+4}" font-size="9" fill="var(--orange)">🎯</text>`;
    const svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
      ${targetLine}${targetLabel}
      <polyline points="${polyline}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${circles}${valueLabels}
    </svg>`;
    weightSection.innerHTML = `<div class="weight-chart-card">
      <div class="weight-chart-title">${tx.weightChartTitle}</div>
      <div class="weight-chart-sub">${tx.weightChartSub}</div>
      <div class="weight-stats">
        <div class="wstat"><div class="wv">${startW}</div><div class="wl">kg</div><div class="wl">${tx.wStart}</div></div>
        <div class="wstat"><div class="wv">${currentW}</div><div class="wl">kg</div><div class="wl">${tx.wCurrent}</div></div>
        <div class="wstat"><div class="wv">${targetW}</div><div class="wl">kg</div><div class="wl">${tx.wTarget}</div></div>
        <div class="wstat"><div class="wv ${deltaSign}">${deltaStr}</div><div class="wl">&nbsp;</div><div class="wl">${tx.wDelta}</div></div>
      </div>
      <div class="chart-wrap">${svg}</div>
    </div>`;
  } else {
    weightSection.innerHTML = '';
  }

  list.innerHTML=checkins.map((ck,i)=>{
    const dp=[100,75,45,15][ck.diet]||0, wp=[100,75,45,15][ck.workout]||0, tp=[100,50,15][ck.tips]||0;
    const stars=Array.from({length:5},(_,j)=>`<span class="${j<ck.stars?'star-f':'star-e'}">${j<ck.stars?'★':'☆'}</span>`).join('');
    const weightBadge = ck.weight ? `<div style="font-size:12px;color:var(--green);font-weight:600;margin-top:4px;">⚖️ ${ck.weight} kg</div>` : '';
    return `<div class="week-card"><div class="week-card-top"><div class="week-card-title">${tx.weekLabel} ${i+1} · ${ck.date}</div><div class="stars-display">${stars}</div></div>${weightBadge}<div style="height:8px"></div><div class="mini-bar-row"><div class="mini-bar-label">🍽️ ${tx.lDiet}</div><div class="mini-bar"><div class="mini-bar-fill mbd" style="width:${dp}%"></div></div><div class="mini-bar-pct">${dp}%</div></div><div class="mini-bar-row"><div class="mini-bar-label">💪 ${tx.lWorkout}</div><div class="mini-bar"><div class="mini-bar-fill mbw" style="width:${wp}%"></div></div><div class="mini-bar-pct">${wp}%</div></div><div class="mini-bar-row"><div class="mini-bar-label">💡 ${tx.lTips}</div><div class="mini-bar"><div class="mini-bar-fill mbt" style="width:${tp}%"></div></div><div class="mini-bar-pct">${tp}%</div></div></div>`;
  }).join('');
  if(checkins.length&&checkins[checkins.length-1].aiFeedback){
    $('aiFeedback').classList.add('show');
    $('aiFeedbackText').textContent=checkins[checkins.length-1].aiFeedback;
  }
}

  ckWeight=parseFloat($('ckWeightInput').value)||null;
  $('btnSaveCheckin').disabled=!(ckDiet!==null&&ckWorkout!==null&&ckTips!==null&&ckStars>0&&ckWeight>0);
}
function selCk(type,i){
  if(type==='diet'){ckDiet=i;document.querySelectorAll('[id^="diet"]').forEach((el,j)=>el.classList.toggle('sel',j===i));}
  if(type==='workout'){ckWorkout=i;document.querySelectorAll('[id^="workout"]').forEach((el,j)=>el.classList.toggle('sel',j===i));}
  if(type==='tips'){ckTips=i;document.querySelectorAll('[id^="tips"]').forEach((el,j)=>el.classList.toggle('sel',j===i));}
  checkCkValid();
}
function selStar(n){
  ckStars=n;
  Array.from({length:5},(_,i)=>{const b=$(`star${i}`);b.textContent=i<n?'★':'☆';b.style.color=i<n?'#f4a261':'var(--border)';});
  checkCkValid();
}

async function saveCheckin(){
  const tx=TX[lang];
  ckWeight=parseFloat($('ckWeightInput').value)||null;
  const ck={date:new Date().toLocaleDateString(),diet:ckDiet,workout:ckWorkout,tips:ckTips,stars:ckStars,weight:ckWeight,aiFeedback:null};
  checkins.push(ck);
  $('modalOverlay').classList.remove('show');
  showTab('progress');
  $('aiFeedback').classList.add('show');
  $('aiFeedbackText').innerHTML=`<div class="ai-feedback-loader"><div class="mini-spin"></div> ${tx.aiFeedbackLoading}</div>`;
  const dp=[100,75,45,15][ckDiet]||0, wp=[100,75,45,15][ckWorkout]||0, tp=[100,50,15][ckTips]||0;
  const LN={it:'Italian',en:'English',es:'Spanish',zh:'Chinese',hi:'Hindi',ar:'Arabic',pt:'Portuguese',fr:'French',de:'German',ja:'Japanese'}[lang]||'Italian';
  try{
    const res=await fetch(window.location.origin+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:320,
        messages:[{role:'user',content:`Personal fitness coach. Write a warm motivating feedback in ${LN} (4-5 sentences).
Goal: ${TX[lang].goals[goal].l}. Week ${checkins.length}.
Diet: ${dp}%, Workouts: ${wp}%, Tips: ${tp}%, Stars: ${ckStars}/5, Weight: ${ckWeight}kg (start: ${savedPlan ? parseFloat($('weight').value||0) : '?'}kg, target: ${savedPlan ? parseFloat($('targetWeight').value||0) : '?'}kg).
Acknowledge wins, address what to improve, give 1 concrete tip for next week. Be encouraging and personal.`}]})
    });
    const data=await res.json();
    ck.aiFeedback=data.content.map(c=>c.text||'').join('');
    $('aiFeedbackText').textContent=ck.aiFeedback;
    renderProgress();
  }catch(e){$('aiFeedbackText').textContent=lang==='it'?'Feedback non disponibile.':'Feedback unavailable.';}
}

function restart(){
  goal=null;actLevel=null;medConds=[];pharmItems=[];diets=[];equip=[];checkins=[];savedPlan=null;
  $('planScreen').classList.remove('show');$('progressScreen').classList.remove('show');$('tabBar').classList.remove('show');
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  $('step1').classList.add('active');currentStep=1;updateProgress(1);
  window.scrollTo({top:0,behavior:'smooth'});
}

init();
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  });
}
</script>
</body>
